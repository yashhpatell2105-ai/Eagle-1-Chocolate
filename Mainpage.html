<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLO Detection Page</title>
  <style>

    body, html {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #1f1cc4;
      font-family: Arial, sans-serif;
    }

    .a4-page {
      width: 210mm;
      min-height: 297mm;
      background: #06ebef;
      margin: 32px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
      gap: 16px;
    }

    .a4-page h2 {
      font-size: 1.8em;
      color: #314e77;
      margin: 0;
    }

    .a4-page p {
      font-size: 1em;
      color: #555;
      text-align: center;
      line-height: 1.6;
      margin: 0;
    }

    .a4-page h1{
      font-size: 1.8em;
      color:#000000;
      margin: 0;
    }

    .back-btn {
      padding: 12px 28px;
      font-size: 1.1em;
      color: #fff;
      background: #557ABC;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .back-btn:hover { background: #314e77; }

    .photo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      width: 100%;
    }

    .detect-btn {
      padding: 12px 32px;
      font-size: 1.1em;
      color: #fff;
      background: #28a745;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      display: none;
    }

    .detect-btn:hover { background: #1e7e34; }

    .detect-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .images-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .img-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .img-box span {
      font-size: 0.9em;
      color: #557ABC;
      font-weight: bold;
    }

    .img-box img {
      width: 260px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .status {
      font-size: 0.95em;
      color: #888;
      min-height: 24px;
    }

    .status.error { color: #dc3545; }
    .status.success { color: #28a745; }

    @media print {
      .back-btn, .photo-section { display: none; }
      body, html { background: none; }
      .a4-page { box-shadow: none; margin: 0 auto; }
    }

  </style>
</head>

<body>

  <div class="a4-page">
       
    <h1>Falcon Technnology</h1>
    <h2>🔍 YOLO Object Detection</h2>
    <p>Select a photo from your laptop and run YOLO detection on it.</p>
    <Br>
        <p>Falcon Tech built a ML model which can detect candy which is in selected photo</p>

    <!-- Back Button -->
    <!-- <button class="back-btn" onclick="window.location.href='7Pro-1.html';">
      ← Go Back to Main Page
    </button> -->

    <!-- Photo + Detection Section -->
    <div class="photo-section">

      <!-- File Input -->
      <input type="file" accept="image/*" id="photoInput">

      <!-- Status Message -->
      <div class="status" id="status">Please select an image...</div>

      <!-- Detect Button -->
      <button class="detect-btn" id="detectBtn" onclick="runDetection()">
        🚀 Run YOLO Detection
      </button>

      <!-- Images: Original + Result -->
      <div class="images-row">
        <div class="img-box" id="originalBox" style="display:none;">
          <span>📷 Original Photo</span>
          <img id="originalPreview" src="" alt="Original">
        </div>
        <div class="img-box" id="resultBox" style="display:none;">
          <span>✅ Detection Result</span>
          <img id="resultPreview" src="" alt="YOLO Result">
        </div>
      </div>

    </div>
  </div>

  <script>
    const input           = document.getElementById('photoInput');
    const detectBtn       = document.getElementById('detectBtn');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview   = document.getElementById('resultPreview');
    const originalBox     = document.getElementById('originalBox');
    const resultBox       = document.getElementById('resultBox');
    const status          = document.getElementById('status');

    // When user picks a photo
    input.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        originalPreview.src = url;
        originalBox.style.display = 'flex';
        resultBox.style.display   = 'none';
        detectBtn.style.display   = 'inline-block';
        status.textContent        = '✅ Image selected! Click "Run YOLO Detection".';
        status.className          = 'status success';
      }
    });

    // Send photo to Python Flask and get result
    async function runDetection() {
      const file = input.files[0];
      if (!file) return;

      detectBtn.disabled  = true;
      detectBtn.textContent = '⏳ Detecting...';
      status.textContent  = 'Sending to YOLO model...';
      status.className    = 'status';

      try {
        const formData = new FormData();
        formData.append('image', file);

        // Send to Python Flask server
        const response = await fetch('http://127.0.0.1:5000/detect', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) throw new Error('Server error: ' + response.status);

        // Get annotated image back
        const blob = await response.blob();
        const resultUrl = URL.createObjectURL(blob);
        resultPreview.src = resultUrl;
        resultBox.style.display = 'flex';

        status.textContent = '🎉 Detection complete!';
        status.className   = 'status success';

      } catch (err) {
        status.textContent = '❌ Error: Make sure app.py is running! (' + err.message + ')';
        status.className   = 'status error';
      }

      detectBtn.disabled    = false;
      detectBtn.textContent = '🚀 Run YOLO Detection';
    }
  </script>

</body>
</html>
